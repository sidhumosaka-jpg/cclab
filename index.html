<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nature Flower Shop</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#F7F9F4;
    color:#2E4D34;
}

header{
    background:#4CAF50;
    color:white;
    text-align:center;
    padding:20px;
}

nav{
    background:#2E7D32;
    text-align:center;
    padding:12px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-weight:bold;
}

.hero{
    text-align:center;
    padding:60px 20px;
    background:#E8F5E9;
}

.hero h1{
    font-size:40px;
    margin-bottom:10px;
}

.hero p{
    font-size:18px;
    margin-bottom:20px;
}

button{
    background:#FF8A80;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:25px;
    cursor:pointer;
    font-size:16px;
}

.products{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    padding:40px;
}

.card{
    background:white;
    width:220px;
    border-radius:12px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
    padding:15px;
}

.card img{
    width:100%;
    border-radius:10px;
}

.card h3{
    margin:15px 0 8px;
}

footer{
    background:#2E7D32;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:30px;
}
</style>

</head>
<body>

<header>
    <h1>🌸 Nature Flower Shop</h1>
    <p>Fresh Flowers • Natural Beauty</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Flowers</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h1>Beautiful Flowers for Every Occasion</h1>
    <p>Fresh, colorful, and naturally grown.</p>
    <button>Shop Now</button>
</section>

<section class="products">

<div class="card">
    <img src="https://via.placeholder.com/220x180?text=Rose" alt="Rose">
    <h3>🌹 Rose</h3>
    <p>$15</p>
</div>

<div class="card">
    <img src="https://via.placeholder.com/220x180?text=Tulip" alt="Tulip">
    <h3>🌷 Tulip</h3>
    <p>$12</p>
</div>

<div class="card">
    <img src="https://via.placeholder.com/220x180?text=Sunflower" alt="Sunflower">
    <h3>🌻 Sunflower</h3>
    <p>$18</p>
</div>

</section>

<footer>
    © 2026 Nature Flower Shop
</footer>

</body>
</html>
